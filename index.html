<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ПІДБІР КОРОБКИ</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <div class="clock-wrapper">
            <div id="clock"></div>
        </div>

        <div class="form-card">

            <h1>ПІДБІР КОРОБКИ</h1>

            <div class="warning-text">
                Габарити відправлення не повинні перевищувати:<br>
                довжина: 100см, ширина: 50см, висота: 50см
            </div>

            <div class="form-title">
                Введіть параметри відправлення
            </div>

            <div class="inputs">

                <div class="field">
                    <input type="number" id="length">
                    <div class="label">ДОВЖИНА (см)</div>
                </div>

                <div class="field">
                    <input type="number" id="width">
                    <div class="label">ШИРИНА (см)</div>
                </div>

                <div class="field">
                    <input type="number" id="height">
                    <div class="label">ВИСОТА (см)</div>
                </div>

            </div>

            <button onclick="findBox()">РОЗРАХУВАТИ</button>

            <div id="result"></div>

        </div>



    </div>

    <script src="script.js"></script>

</body>

</html>
